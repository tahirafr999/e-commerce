services:
  - type: web
    name: ecommerce-app
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: RENDER
        value: True
    disk:
      name: static-files
      mountPath: /app/staticfiles
      sizeGB: 1

